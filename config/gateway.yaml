server:
  port: 8080

admin:
  port: 9090

upstreams:
  - name: service-a
    targets:
      - http://localhost:5000

  - name: service-b
    targets:
      - http://localhost:6000

routes:
  - path: /api/v1/
    upstream: service-a
    plugins:
      rate_limit:
        enabled: true
        requests_per_second: 100.0
        burst: 20
      cache:
        enabled: true
        ttl_seconds: 30
        max_entries: 1000
      auth:
        enabled: false
        users: []

  - path: /api/v2/
    upstream: service-b
    plugins:
      rate_limit:
        enabled: true
        requests_per_second: 50.0
        burst: 10
      cache:
        enabled: false
        ttl_seconds: 0
        max_entries: 0
      auth:
        enabled: true
        users:
          - username: admin
            password: secret
